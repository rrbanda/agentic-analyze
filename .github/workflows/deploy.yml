name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject auth hashes
        run: sed -i "s|__AUTH_HASHES__|${AUTH_HASHES}|g" index.html
        env:
          AUTH_HASHES: ${{ secrets.AUTH_HASHES }}

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,docs,mkdocs.yml,requirements.txt,.gitignore'
