name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install mkdocs-material mkdocs-mermaid2-plugin

      - name: Inject auth hashes
        run: |
          find docs/overrides -name '*.html' -exec sed -i "s|__AUTH_HASHES__|${AUTH_HASHES}|g" {} +
        env:
          AUTH_HASHES: ${{ secrets.AUTH_HASHES }}

      - run: mkdocs gh-deploy --force
