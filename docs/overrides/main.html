{% extends "base.html" %}

{% block body %}
<div id="auth-wall" style="display:none; position:fixed; inset:0; z-index:9999; background:#1a1a2e; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <div style="max-width:380px; margin:12vh auto; padding:2.5rem; background:#16213e; border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.4);">
    <div style="text-align:center; margin-bottom:1.5rem;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      <h2 style="color:#e2e8f0; margin:.75rem 0 .25rem; font-size:1.4rem;">Restricted Access</h2>
      <p style="color:#94a3b8; font-size:.85rem; margin:0;">Enter credentials to continue</p>
    </div>
    <form id="auth-form" autocomplete="off">
      <label style="display:block; color:#cbd5e1; font-size:.8rem; font-weight:600; margin-bottom:.35rem;">Username</label>
      <input id="auth-user" type="text" autocomplete="username" required
        style="width:100%; padding:.6rem .75rem; margin-bottom:.85rem; border:1px solid #334155; border-radius:8px; background:#0f172a; color:#e2e8f0; font-size:.95rem; box-sizing:border-box; outline:none;"
        onfocus="this.style.borderColor='#7c3aed'" onblur="this.style.borderColor='#334155'">
      <label style="display:block; color:#cbd5e1; font-size:.8rem; font-weight:600; margin-bottom:.35rem;">Password</label>
      <input id="auth-pass" type="password" autocomplete="current-password" required
        style="width:100%; padding:.6rem .75rem; margin-bottom:1rem; border:1px solid #334155; border-radius:8px; background:#0f172a; color:#e2e8f0; font-size:.95rem; box-sizing:border-box; outline:none;"
        onfocus="this.style.borderColor='#7c3aed'" onblur="this.style.borderColor='#334155'">
      <div id="auth-error" style="display:none; color:#f87171; font-size:.8rem; margin-bottom:.75rem; text-align:center;">Invalid credentials. Try again.</div>
      <button type="submit"
        style="width:100%; padding:.7rem; background:#7c3aed; color:#fff; border:none; border-radius:8px; font-size:.95rem; font-weight:600; cursor:pointer; transition:background .2s;"
        onmouseover="this.style.background='#6d28d9'" onmouseout="this.style.background='#7c3aed'">
        Sign In
      </button>
    </form>
    <p style="text-align:center; color:#475569; font-size:.75rem; margin-top:1.25rem;">Session persists until browser is closed.</p>
  </div>
</div>

<script>
(function() {
  var VALID = new Set(("__AUTH_HASHES__").split(",").filter(Boolean));

  // Encode credentials to SHA-256 hex
  async function sha256(msg) {
    var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");
  }

  var SESSION_KEY = "agentic_analyze_auth";
  var wall = document.getElementById("auth-wall");
  var content = document.querySelector(".md-content");
  var sidebar = document.querySelector(".md-sidebar");
  var tabs = document.querySelector(".md-tabs");

  function hideContent() {
    if (content) content.style.display = "none";
    if (sidebar) { document.querySelectorAll(".md-sidebar").forEach(function(s){s.style.display="none"}) };
    if (tabs) tabs.style.display = "none";
    wall.style.display = "block";
  }

  function showContent() {
    wall.style.display = "none";
    if (content) content.style.display = "";
    document.querySelectorAll(".md-sidebar").forEach(function(s){s.style.display=""});
    if (tabs) tabs.style.display = "";
  }

  // Check session
  if (sessionStorage.getItem(SESSION_KEY) === "1") {
    wall.style.display = "none";
  } else {
    hideContent();
  }

  document.getElementById("auth-form").addEventListener("submit", async function(e) {
    e.preventDefault();
    var u = document.getElementById("auth-user").value;
    var p = document.getElementById("auth-pass").value;
    var hash = await sha256(u + ":" + p);
    if (VALID.has(hash)) {
      sessionStorage.setItem(SESSION_KEY, "1");
      showContent();
    } else {
      document.getElementById("auth-error").style.display = "block";
      document.getElementById("auth-pass").value = "";
    }
  });
})();
</script>

{{ super() }}
{% endblock %}
